apiVersion: v1
kind: ServiceAccount
metadata:
  name: self-healing
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: self-healing
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: self-healing
  namespace: default
subjects:
  - kind: ServiceAccount
    name: self-healing
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: self-healing
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing
  namespace: default
  labels:
    app: self-healing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: self-healing
  template:
    metadata:
      labels:
        app: self-healing
    spec:
      serviceAccountName: self-healing
      containers:
        - name: self-healing
          image: self-healing:v15
          imagePullPolicy: IfNotPresent
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PROMETHEUS_BASE_URL
              value: http://prometheus-server.monitoring.svc.cluster.local
            - name: KUBERNETES_NAMESPACE
              value: default
            - name: TARGET_SERVICE_NAME
              value: frontend
            - name: TARGET_CONTAINER_NAME
              value: server
